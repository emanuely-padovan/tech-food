<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/style.css" />
    <title>TechFood - Sabor & Saber</title>
  </head>
  <body>
    <!-- Modal de boas-vindas -->
    <div id="modal-boas-vindas" style="display: none">
      <div class="modal-bv-conteudo">
        <h2>👋 Bem-vindo ao TechFood!</h2>
        <p>Como podemos te chamar?</p>
        <input type="text" id="input-nome-cliente" placeholder="Digite seu nome..." maxlength="30"/>
        <button id="btn-confirmar-nome">Confirmar</button>
      </div>
    </div>

    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
      <p id="boas-vindas">Carregando...</p>

      <input type="checkbox" id="bt_menu" />
      <label for="bt_menu" id="label-menu" aria-label="Abrir menu">&#9776;</label>

      <nav id="menu">
        <ul>
          <li><a href="#grid-cardapio">Cardápio</a></li>
          <li><a href="pedidos.html">Meus Pedidos</a></li>
          <li><a href="cadastro.html">Cadastrar Prato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="secao-cardapio">
        <h2 class="titulo-secao">Nosso Cardápio</h2>
        <div class="vitrine-grid" id="grid-cardapio">
          <!-- Preenchido pelo main.js via API -->
        </div>
      </section>
    </main>

    <footer id="rodape">
      <div class="info-footer">
        <p><strong>TechFood 2026</strong></p>
        <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
        <p>Av. das Nações, 1500</p>
      </div>
      <p id="data-hora-footer"></p>
    </footer>

    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/api.js"></script>
    <script src="src/scripts/main.js"></script>
  </body>
</html>
