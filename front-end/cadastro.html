<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/cadastro.css">
    <title>TechFood - Sabor & Saber</title>
</head>
<body>
    <header id="topo-loja">
        <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
        <p id="boas-vindas">Carregando...</p>

        <input type="checkbox" id="bt_menu" />
        <label for="bt_menu" id="label-menu" aria-label="Abrir menu">&#9776;</label>

        <nav id="menu">
            <ul>
                <li><a href="index.html">Cardápio</a></li>
                <li><a href="pedidos.html">Meus Pedidos</a></li>
                <li><a href="cadastro.html">Cadastrar Prato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="secao-cadastro">
            <h2 class="titulo-secao">Cadastro de Produto:</h2>
            <form id="form-cadastro">
                <label for="nome-prato">Nome: </label>
                <input type="text" id="nome-prato" name="nome-prato" required>

                <label for="descricao-prato">Descrição: </label>
                <textarea name="descricao-prato" id="descricao-prato" required></textarea>

                <label for="categoria-prato">Categoria: </label>
                <select name="categoria-prato" id="categoria-prato" required>
                    <option value="" selected disabled>Selecione uma categoria</option>
                    <option value="Massa">Massa</option>
                    <option value="Bebida">Bebida</option>
                </select>

                <label for="preco-prato">Preço: </label>
                <input type="text" id="preco-prato" name="preco-prato" required>

                <label for="disponibilidade">Disponível?</label>
                <select name="disponibilidade" id="disponibilidade" required>
                    <option value="" selected disabled>Selecione uma opção...</option>
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>

                <label for="imagem">Imagem</label>
                <input type="file" id="imagem" name="imagem" accept="image/*" required>

                <button type="submit" id="bt-cadastrar">Cadastrar</button>
            </form>
        </section>
    </main>
    <footer id="rodape">
        <div class="info-footer">
            <p><strong>TechFood 2026</strong></p>
            <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
            <p>Av. das Nações, 1500</p>
        </div>
        <p id="data-hora-footer"></p>
    </footer>

    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/api.js"></script>
    <script src="src/scripts/cadastro.js"></script>
</body>
</html>
